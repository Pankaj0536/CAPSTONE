{% extends "base.html" %}

{% block title %}SeekAnalyser Home{% endblock %}

{% block content %}

<section class="hero-section" style="
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
">

    <div class="hero-panel glass-card" style="
        width:85%;
        max-width:850px;
        padding:45px;
        border-radius:18px;
        background: rgba(218, 15, 15, 0.05);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(46, 2, 239, 0.2);
    ">

        <!-- 🔥 Animated Title -->
        <h1 style="
            font-size:34px;
            font-weight:700;
            margin-bottom:22px;
            line-height:1.3;
            overflow:hidden;
            white-space:nowrap;
            border-right: 3px solid #3b82f6;
            width: 0;
            animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
        ">
            Welcome to <span style="color:#3b82f6;">SeekAnalyser</span>
        </h1>

        <div style="display:flex; flex-direction:column; gap:15px;">

            
            <a href="{{ url_for('options') }}" style="
        width:100%;
        text-align:center;
        padding:12px 0;
        border-radius:10px;
        border:1px solid #0b0b0c;
        color:#3b82f6;
        text-decoration:none;
        font-size:14px;
        font-weight:500;
        transition:0.3s;
    "
    onmouseover="this.style.boxShadow='0 0 15px #3b82f6'; this.style.transform='scale(1.03)'"
    onmouseout="this.style.boxShadow='none'; this.style.transform='scale(1)'"
    >
    📘 Explore Learning
</a>
<a href="{{ url_for('ssd_vs_hdd') }}" style="
    width:100%;
    text-align:center;
    padding:12px 0;
    border-radius:10px;
    background: linear-gradient(135deg, #151516, #08090c);
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
    transition:0.3s;
"
onmouseover="this.style.boxShadow='0 0 15px #3b82f6'; this.style.transform='scale(1.03)'"
onmouseout="this.style.boxShadow='none'; this.style.transform='scale(1)'"
>
    🚀 Open Performance Lab
</a>

</div>
    </div>

</section>

<!-- 🔥 CSS -->
<style>

/* Typing Animation */
@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* HDD Disk */
.disk {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, #666, #111);
    animation: spin 2s linear infinite;
    margin: auto;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* SSD Grid */
.ssd-grid {
    display: grid;
    grid-template-columns: repeat(3, 20px);
    gap: 6px;
}

.ssd-block {
    width: 20px;
    height: 20px;
    background: #0f172a;
    border-radius: 4px;
    border: 1px solid rgba(59,130,246,0.3);
}

/* Active Flash */
.ssd-block.active {
    background: #3b82f6;
    box-shadow: 0 0 10px #3b82f6;
}

</style>

<!-- 🔥 JS -->
<script>

// Create SSD blocks
const grid = document.getElementById("ssdGrid");

if (grid) {
    for (let i = 0; i < 9; i++) {
        let div = document.createElement("div");
        div.classList.add("ssd-block");
        grid.appendChild(div);
    }

    // Animate random access
    setInterval(() => {
        let blocks = document.querySelectorAll(".ssd-block");
        blocks.forEach(b => b.classList.remove("active"));

        let index = Math.floor(Math.random() * blocks.length);
        blocks[index].classList.add("active");
    }, 500);
}

</script>

{% endblock %}
